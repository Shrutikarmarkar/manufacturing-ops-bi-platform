version: 2

models:
  - name: fct_work_orders
    columns:
      - name: work_order_id
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: is_on_time
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]

  - name: fct_purchase_orders
    columns:
      - name: purchase_order_id
        tests:
          - unique
          - not_null
      - name: vendor_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4]

  - name: fct_product_vendor_pricing
    columns:
      - name: product_id
        tests:
          - not_null
      - name: vendor_id
        tests:
          - not_null